<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Trainers Squad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="auth-wrapper">
    <div class="auth-branding d-none d-lg-flex">
        <div class="auth-branding-content">
            <a href="index.html" class="d-inline-block mb-4">
                <div class="navbar-logo-placeholder mx-auto" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.3);">LOGO — 160×40</div>
            </a>
            <h2>Welcome Back!</h2>
            <p>Access your courses, track your progress, and continue your learning journey.</p>
            <div class="auth-illustration-placeholder mt-4">
                <i class="fas fa-image"></i>
                <span>Auth Illustration — 400×300<br>Add nice vector illustration here</span>
            </div>
        </div>
    </div>
    
    <div class="auth-form-side">
        <div class="auth-form-card">
            <div class="d-lg-none mb-4 text-center">
                <a href="index.html" class="d-inline-block">
                    <div class="navbar-logo-placeholder mx-auto">LOGO — 160×40</div>
                </a>
            </div>
            
            <h3>Sign in to your account</h3>
            <p class="subtitle">Enter your credentials below</p>
            
            <form action="student-dashboard.html">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0">Password</label>
                        <a href="forgot-password.html" class="text-primary text-decoration-none" style="font-size:0.8rem;font-weight:600;">Forgot Password?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe" style="font-size:0.85rem;color:var(--text-body);">Keep me signed in</label>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2">Sign In</button>
            </form>
            
            <div class="auth-divider">OR</div>
            
            <div class="d-flex gap-3 mb-4">
                <button class="social-login-btn">
                    <i class="fab fa-google text-danger"></i> Google
                </button>
                <button class="social-login-btn">
                    <i class="fab fa-linkedin text-primary"></i> LinkedIn
                </button>
            </div>
            
            <div class="text-center mt-4">
                <span style="color:var(--text-muted);font-size:0.9rem;">Don't have an account?</span>
                <a href="register.html" class="text-accent fw-bold text-decoration-none ms-1">Register Now</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
