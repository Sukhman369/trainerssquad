<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Management — Trainers Squad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<!-- SIDEBAR -->
<aside class="dashboard-sidebar admin-sidebar" id="sidebar">
    <div class="sidebar-header"><div class="navbar-logo-placeholder mx-auto" style="width:140px;height:36px;font-size:0.6rem;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;">LOGO — 140×36</div></div>
    <div class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <div class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></div>
        <div class="nav-item"><a href="leads.html" class="nav-link"><i class="fas fa-users"></i> Lead CRM</a></div>
        
        <div class="nav-section-title">Content</div>
        <div class="nav-item"><a href="courses.html" class="nav-link"><i class="fas fa-book-open"></i> Courses</a></div>
        <div class="nav-item"><a href="blogs.html" class="nav-link active"><i class="fas fa-rss"></i> Blogs</a></div>
    </div>
</aside>

<header class="dashboard-topbar"></header>

<main class="dashboard-main">
    <div class="dashboard-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold">Manage Blogs</h4>
            <button class="btn btn-primary-custom btn-sm"><i class="fas fa-plus me-1"></i> Write New Post</button>
        </div>

        <div class="data-table-card">
            <div class="table-header">
                <div class="d-flex gap-2 w-100 flex-wrap">
                    <input type="text" class="form-control form-control-sm" placeholder="Search blog title..." style="max-width:200px;">
                    <select class="form-select form-select-sm w-auto">
                        <option>All Categories</option>
                        <option>Tech Trends</option>
                        <option>Career Advice</option>
                    </select>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Author</th>
                            <th>Status & Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="fw-bold text-dark">Top 10 Data Science Skills in 2026</div>
                            </td>
                            <td><span class="badge bg-light text-dark border">Tech Trends</span></td>
                            <td>John Smith</td>
                            <td>
                                <span class="status-badge published mb-1">Published</span>
                                <div class="small text-muted">Oct 18, 2026</div>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-light border"><i class="fas fa-edit text-primary"></i></button>
                                <button class="btn btn-sm btn-light border"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <div class="fw-bold text-dark">How to Ace Your Amazon Technical Interview</div>
                            </td>
                            <td><span class="badge bg-light text-dark border">Career Advice</span></td>
                            <td>Jane Doe</td>
                            <td>
                                <span class="status-badge draft mb-1">Draft</span>
                                <div class="small text-muted">-</div>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-light border"><i class="fas fa-edit text-primary"></i></button>
                                <button class="btn btn-sm btn-light border"><i class="fas fa-trash text-danger"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
