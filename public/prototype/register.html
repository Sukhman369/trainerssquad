<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Trainers Squad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="auth-wrapper">
    <div class="auth-branding d-none d-lg-flex">
        <div class="auth-branding-content">
            <a href="index.html" class="d-inline-block mb-4">
                <div class="navbar-logo-placeholder mx-auto" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.3);">LOGO — 160×40</div>
            </a>
            <h2>Start Your Journey</h2>
            <p>Join 15,000+ students and accelerate your career with industry-recognized certifications.</p>
            <div class="auth-illustration-placeholder mt-4">
                <i class="fas fa-user-graduate"></i>
                <span>Auth Illustration — 400×300<br>Add nice vector illustration here</span>
            </div>
        </div>
    </div>
    
    <div class="auth-form-side">
        <div class="auth-form-card" style="max-width: 500px;">
            <div class="d-lg-none mb-4 text-center">
                <a href="index.html" class="d-inline-block">
                    <div class="navbar-logo-placeholder mx-auto">LOGO — 160×40</div>
                </a>
            </div>
            
            <h3>Create an Account</h3>
            <p class="subtitle">Enter your details to register</p>
            
            <form action="student-dashboard.html">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-control" placeholder="+91" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Create password" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm password" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Course of Interest</label>
                    <select class="form-select" style="font-size:0.9rem;">
                        <option selected disabled>Select a course</option>
                        <option>Data Science & AI</option>
                        <option>Full Stack Development</option>
                        <option>Cloud Computing (AWS/Azure)</option>
                        <option>DevOps Engineering</option>
                        <option>Cyber Security</option>
                    </select>
                </div>
                
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms" style="font-size:0.85rem;color:var(--text-body);">I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> & <a href="#" class="text-primary text-decoration-none">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2">Create Account</button>
            </form>
            
            <div class="auth-divider">OR</div>
            
            <button class="social-login-btn w-100 mb-4">
                <i class="fab fa-google text-danger"></i> Sign up with Google
            </button>
            
            <div class="text-center">
                <span style="color:var(--text-muted);font-size:0.9rem;">Already have an account?</span>
                <a href="login.html" class="text-accent fw-bold text-decoration-none ms-1">Sign In</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
