<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Trainers Squad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="auth-wrapper">
    <div class="auth-branding d-none d-lg-flex">
        <div class="auth-branding-content">
            <a href="index.html" class="d-inline-block mb-4">
                <div class="navbar-logo-placeholder mx-auto" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.3);">LOGO — 160×40</div>
            </a>
            <h2>Secure Recovery</h2>
            <p>Don't worry, we'll help you get back to learning in no time.</p>
            <div class="auth-illustration-placeholder mt-4">
                <i class="fas fa-shield-alt"></i>
                <span>Auth Illustration — 400×300<br>Add nice vector illustration here</span>
            </div>
        </div>
    </div>
    
    <div class="auth-form-side">
        <div class="auth-form-card">
            <div class="d-lg-none mb-4 text-center">
                <a href="index.html" class="d-inline-block">
                    <div class="navbar-logo-placeholder mx-auto">LOGO — 160×40</div>
                </a>
            </div>
            
            <a href="login.html" class="text-decoration-none d-inline-block mb-3" style="font-size:0.85rem;font-weight:600;"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
            
            <h3>Reset Password</h3>
            <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form action="login.html">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2">Send Reset Link</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
